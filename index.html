<div class="hero"><div class="hero-badge">YC Investment Analysis</div><h1>The Post-ChatGPT Era</h1><p>How Y Combinator's investment thesis evolved across 1747 startups from Winter 2023 to Summer 2026</p><div class="hero-stats"><div class="hero-stat"><div class="num">1747</div><div class="label">Companies Analyzed</div></div><div class="hero-stat"><div class="num">12</div><div class="label">YC Batches</div></div><div class="hero-stat"><div class="num">3 Yrs</div><div class="label">Post-ChatGPT Cohort</div></div><div class="hero-stat"><div class="num">~25%</div><div class="label">AI Agent Share (W26)</div></div></div></div>

<div id="section-trends" class="section active"><h2 class="section-title">Investment Trend Lines</h2><p class="section-subtitle">How YC's investment themes shifted across each batch from Winter 2023 to Summer 2026</p><div class="summary-bar"><div class="summary-item"><div class="s-num">+10.6pp</div><div class="s-label">AI Agents Growth</div><div class="s-sub">W23 to W26 (% of batch)</div></div><div class="summary-item"><div class="s-num">+7.0pp</div><div class="s-label">Manufacturing AI</div><div class="s-sub">Fastest growing theme</div></div><div class="summary-item"><div class="s-num">5x</div><div class="s-label">Defense AI</div><div class="s-sub">Relative increase</div></div><div class="summary-item"><div class="s-num">Flat</div><div class="s-label">Fintech</div><div class="s-sub">Stabilizing post-2022</div></div><div class="summary-item"><div class="s-num">Slowing</div><div class="s-label">AI Coding Tools</div><div class="s-sub">Market maturing</div></div></div><div class="chart-grid chart-grid-1"><div class="chart-card"><h3>Archetype % Share Per Batch</h3><p>What % of each YC batch belongs to each startup archetype — tracks rise of AI Agents and evolution over time</p><div style="height:420px;position:relative"><canvas id="trendLineChart"></canvas></div></div></div><div class="chart-grid chart-grid-2"><div class="chart-card"><h3>Sub-Theme Trend Lines</h3><p>Deeper breakdown by specific sub-themes (% of batch)</p><div style="height:340px;position:relative"><canvas id="subThemeChart"></canvas></div></div><div class="chart-card"><h3>Rising vs Falling Themes</h3><p>Early batches (W23-Su24) vs recent batches (Su25-W26)</p><div style="height:340px;position:relative"><canvas id="risingFallingChart"></canvas></div></div></div><div class="chart-grid chart-grid-2"><div class="chart-card"><h3>Overall Portfolio Mix</h3><p>Archetype distribution across all 1747 companies</p><div style="height:300px;position:relative"><canvas id="donutChart"></canvas></div></div><div class="chart-card"><h3>Batch Sizes Over Time</h3><p>How many companies YC funded per batch</p><div style="height:300px;position:relative"><canvas id="batchSizeChart"></canvas></div></div></div></div>
<div id="section-insights" class="section"><h2 class="section-title">Commentary and Insights</h2><p class="section-subtitle">What the data reveals about where technology and startups are heading</p><div class="insights-grid"><div class="insight-card"><div class="insight-icon">🤖</div><h3>The Age of AI Agents</h3><p>The single biggest shift since ChatGPT: AI agent companies grew from 13% of YC batches in W2023 to over 25% by W2026. YC is betting that AI will replace entire job functions. Agents for sales, finance ops, legal review, HR, customer support, and coding have all exploded.</p></div>
<div class="insight-card"><div class="insight-icon">⚔️</div><h3>Defense and National Security Surge</h3><p>Defense AI went from a rounding error (0.3%) to 1.6% of all YC companies — a 5x relative increase. Physical-world AI with strategic importance is now a priority. Expect this to keep growing as geopolitical tensions escalate.</p></div>
<div class="insight-card"><div class="insight-icon">🏭</div><h3>The Physical World Turn</h3><p>Manufacturing AI and industrial robotics nearly doubled as a share of YC investments. The atoms-not-bits movement is real. Companies building AI for factories, warehouses, and physical operations represent the next major wave.</p></div>
<div class="insight-card"><div class="insight-icon">💊</div><h3>Bio is Back</h3><p>Drug discovery AI, clinical workflow automation, and healthcare diagnostics have all grown consistently. Foundation models plus biology have created a new generation of biotech startups fundamentally different from the CRISPR-era companies.</p></div>
<div class="insight-card"><div class="insight-icon">🔧</div><h3>Dev Tools Maturing</h3><p>AI coding tools started at around 18% of investments but have been declining slightly as the market matures. The coding assistant space is commoditizing. YC is now funding second-order plays: AI for QA, security testing, code review, and DevOps.</p></div>
<div class="insight-card"><div class="insight-icon">🌍</div><h3>Global Fintech Proliferating</h3><p>Fintech remains stubbornly large (8-12% per batch) with a new twist: stablecoins, crypto infra, and cross-border payment rails are making a comeback. The theme is programmable money for the developing world.</p></div>
<div class="insight-card"><div class="insight-icon">🚀</div><h3>The Vertical AI Playbook</h3><p>The dominant startup archetype of 2024-2026 is vertical AI: take a specific industry (insurance, agriculture, construction, freight) and apply an AI agent layer that automates the most expensive human workflows. YC companies are following this playbook at scale.</p></div>
<div class="insight-card"><div class="insight-icon">🔮</div><h3>What Comes Next</h3><p>Signals in the most recent batches: (1) AI-native hardware products, (2) scientific discovery AI for physics, materials, and climate, (3) multi-agent orchestration infrastructure, and (4) AI companies in overlooked geographies like India, LatAm, and Africa.</p></div></div></div>
<div id="section-ideation" class="section"><h2 class="section-title">Ideation Clusters</h2><p class="section-subtitle">The 12 dominant opportunity clusters YC is backing — with specific sub-themes and startup ideas</p><div class="clusters-grid"><div class="cluster-card"><div class="cluster-header"><div class="cluster-icon" style="background:#FF6B3522">🤖</div><div><div class="cluster-title">AI Agents for Knowledge Work</div><div class="cluster-count">~362 companies</div></div></div><div class="cluster-themes"><span class="theme-tag" style="background:#FF6B3522;color:#FF6B35">Finance Ops Agent</span><span class="theme-tag" style="background:#FF6B3522;color:#FF6B35">Legal Review Agent</span><span class="theme-tag" style="background:#FF6B3522;color:#FF6B35">HR Agent</span><span class="theme-tag" style="background:#FF6B3522;color:#FF6B35">Sales Agent</span><span class="theme-tag" style="background:#FF6B3522;color:#FF6B35">CS Agent</span></div><p class="cluster-desc">The biggest single bet YC is making. AI agents that replace knowledge workers in specific workflows. Not generic assistants but deeply specialized agents with domain expertise.</p><div class="cluster-examples">💡 Idea: Pick any $100B+ industry vertical (insurance, accounting, logistics brokerage) and build an AI agent that handles 80% of the repetitive cognitive work.</div></div>
<div class="cluster-card"><div class="cluster-header"><div class="cluster-icon" style="background:#4ECDC422">💻</div><div><div class="cluster-title">AI Dev Tools and Code Intelligence</div><div class="cluster-count">~187 companies</div></div></div><div class="cluster-themes"><span class="theme-tag" style="background:#4ECDC422;color:#4ECDC4">Code Review AI</span><span class="theme-tag" style="background:#4ECDC422;color:#4ECDC4">Testing AI</span><span class="theme-tag" style="background:#4ECDC422;color:#4ECDC4">DevSecOps AI</span><span class="theme-tag" style="background:#4ECDC422;color:#4ECDC4">Infra-as-Code AI</span><span class="theme-tag" style="background:#4ECDC422;color:#4ECDC4">PR Automation</span></div><p class="cluster-desc">Beyond code completion: the entire software development lifecycle is being automated. QA, security scanning, code review, deployment, and monitoring are all being rebuilt with AI.</p><div class="cluster-examples">💡 Idea: What does an AI-native CI/CD pipeline look like? Or AI that automatically fixes production bugs as they appear in logs?</div></div>
<div class="cluster-card"><div class="cluster-header"><div class="cluster-icon" style="background:#DDA0DD22">🏥</div><div><div class="cluster-title">Healthcare AI and Clinical Automation</div><div class="cluster-count">~98 companies</div></div></div><div class="cluster-themes"><span class="theme-tag" style="background:#DDA0DD22;color:#DDA0DD">Prior Auth AI</span><span class="theme-tag" style="background:#DDA0DD22;color:#DDA0DD">Clinical Documentation</span><span class="theme-tag" style="background:#DDA0DD22;color:#DDA0DD">Drug Discovery</span><span class="theme-tag" style="background:#DDA0DD22;color:#DDA0DD">Diagnostics AI</span><span class="theme-tag" style="background:#DDA0DD22;color:#DDA0DD">Mental Health AI</span></div><p class="cluster-desc">Healthcare has decades of accumulated inefficiency. AI is attacking prior authorization, clinical notes, diagnosis, scheduling, and billing simultaneously.</p><div class="cluster-examples">💡 Idea: Prior authorization alone costs $35B/year in admin waste. An AI handling end-to-end prior auth for a single specialty could be a massive business.</div></div>
<div class="cluster-card"><div class="cluster-header"><div class="cluster-icon" style="background:#C0392B22">⚔️</div><div><div class="cluster-title">Defense, Intel and GovTech</div><div class="cluster-count">~35 companies</div></div></div><div class="cluster-themes"><span class="theme-tag" style="background:#C0392B22;color:#C0392B">Drone Swarm AI</span><span class="theme-tag" style="background:#C0392B22;color:#C0392B">ISR Automation</span><span class="theme-tag" style="background:#C0392B22;color:#C0392B">Procurement AI</span><span class="theme-tag" style="background:#C0392B22;color:#C0392B">Cyber Defense</span><span class="theme-tag" style="background:#C0392B22;color:#C0392B">Border Surveillance</span></div><p class="cluster-desc">Fastest-growing segment in the most recent batches. Driven by geopolitical tensions and defense modernization budgets. Palantir-era government tech is being rebuilt on modern AI.</p><div class="cluster-examples">💡 Idea: Government has the worst software in the world. Pick any federal agency workflow and build AI-native tooling for it.</div></div>
<div class="cluster-card"><div class="cluster-header"><div class="cluster-icon" style="background:#E67E2222">🏭</div><div><div class="cluster-title">Industrial AI and Smart Manufacturing</div><div class="cluster-count">~142 companies</div></div></div><div class="cluster-themes"><span class="theme-tag" style="background:#E67E2222;color:#E67E22">Quality Control AI</span><span class="theme-tag" style="background:#E67E2222;color:#E67E22">Predictive Maintenance</span><span class="theme-tag" style="background:#E67E2222;color:#E67E22">Factory Robotics</span><span class="theme-tag" style="background:#E67E2222;color:#E67E22">Supply Chain AI</span><span class="theme-tag" style="background:#E67E2222;color:#E67E22">Energy Optimization</span></div><p class="cluster-desc">Manufacturing has been slow to digitize. AI vision systems, predictive maintenance, and robotic automation are transforming factories.</p><div class="cluster-examples">💡 Idea: Every factory has equipment that breaks unexpectedly. AI that reduces unplanned downtime by 50% is worth billions across industries.</div></div>
<div class="cluster-card"><div class="cluster-header"><div class="cluster-icon" style="background:#27AE6022">🌱</div><div><div class="cluster-title">Climate Tech and Energy Infrastructure</div><div class="cluster-count">~121 companies</div></div></div><div class="cluster-themes"><span class="theme-tag" style="background:#27AE6022;color:#27AE60">Grid AI</span><span class="theme-tag" style="background:#27AE6022;color:#27AE60">Carbon Markets</span><span class="theme-tag" style="background:#27AE6022;color:#27AE60">Nuclear Revival</span><span class="theme-tag" style="background:#27AE6022;color:#27AE60">EV Infra</span><span class="theme-tag" style="background:#27AE6022;color:#27AE60">Industrial Emissions</span><span class="theme-tag" style="background:#27AE6022;color:#27AE60">Energy Storage</span></div><p class="cluster-desc">Two separate waves: the climate wave building carbon markets and clean energy, and the AI-driven energy wave building infrastructure to power AI data centers.</p><div class="cluster-examples">💡 Idea: AI inference requires massive power. Companies that can procure, optimize, or trade energy for AI data centers will be critical infrastructure.</div></div>
<div class="cluster-card"><div class="cluster-header"><div class="cluster-icon" style="background:#98D8C822">🧬</div><div><div class="cluster-title">Drug Discovery and Bio AI</div><div class="cluster-count">~55 companies</div></div></div><div class="cluster-themes"><span class="theme-tag" style="background:#98D8C822;color:#98D8C8">Protein Design</span><span class="theme-tag" style="background:#98D8C822;color:#98D8C8">Clinical Trial AI</span><span class="theme-tag" style="background:#98D8C822;color:#98D8C8">Genomics</span><span class="theme-tag" style="background:#98D8C822;color:#98D8C8">Longevity</span><span class="theme-tag" style="background:#98D8C822;color:#98D8C8">Cell Therapy</span></div><p class="cluster-desc">Foundation models have changed what is possible in drug discovery. AlphaFold-generation companies are applying transformer architectures to molecular design and genomics.</p><div class="cluster-examples">💡 Idea: Most drug discovery AI is focused on small molecules. AI for drug repurposing -- matching approved drugs to new indications at scale -- has a massive market.</div></div>
<div class="cluster-card"><div class="cluster-header"><div class="cluster-icon" style="background:#45B7D122">💳</div><div><div class="cluster-title">Next-Gen Fintech and Programmable Money</div><div class="cluster-count">~149 companies</div></div></div><div class="cluster-themes"><span class="theme-tag" style="background:#45B7D122;color:#45B7D1">Stablecoin Rails</span><span class="theme-tag" style="background:#45B7D122;color:#45B7D1">B2B Payments</span><span class="theme-tag" style="background:#45B7D122;color:#45B7D1">SMB Banking</span><span class="theme-tag" style="background:#45B7D122;color:#45B7D1">Insurance AI</span><span class="theme-tag" style="background:#45B7D122;color:#45B7D1">Treasury AI</span><span class="theme-tag" style="background:#45B7D122;color:#45B7D1">Embedded Finance</span></div><p class="cluster-desc">Post-FTX fintech is back: stablecoins for cross-border, AI-powered financial workflows for SMBs, and embedded finance in unexpected verticals.</p><div class="cluster-examples">💡 Idea: Stablecoins settling in seconds are making cross-border B2B payments a real opportunity. Who is building the Stripe for stablecoin payments?</div></div>
<div class="cluster-card"><div class="cluster-header"><div class="cluster-icon" style="background:#9999ff22">🔐</div><div><div class="cluster-title">Security, Identity and Compliance</div><div class="cluster-count">~82 companies</div></div></div><div class="cluster-themes"><span class="theme-tag" style="background:#9999ff22;color:#9999ff">AI-Powered SecOps</span><span class="theme-tag" style="background:#9999ff22;color:#9999ff">Identity Verification</span><span class="theme-tag" style="background:#9999ff22;color:#9999ff">SOC 2 Automation</span><span class="theme-tag" style="background:#9999ff22;color:#9999ff">API Security</span><span class="theme-tag" style="background:#9999ff22;color:#9999ff">Threat Detection</span></div><p class="cluster-desc">AI is simultaneously creating new attack surfaces and enabling new defenses. The security stack is being rebuilt around AI-native threat detection and automated compliance.</p><div class="cluster-examples">💡 Idea: AI agents can be socially engineered just like humans. AI red teaming -- testing AI systems for prompt injection -- is a nascent but critical space.</div></div>
<div class="cluster-card"><div class="cluster-header"><div class="cluster-icon" style="background:#FFEAA722">🤝</div><div><div class="cluster-title">B2B Sales and GTM Intelligence</div><div class="cluster-count">~61 companies</div></div></div><div class="cluster-themes"><span class="theme-tag" style="background:#FFEAA722;color:#FFEAA7">AI SDR</span><span class="theme-tag" style="background:#FFEAA722;color:#FFEAA7">Intent Data</span><span class="theme-tag" style="background:#FFEAA722;color:#FFEAA7">Competitive Intel</span><span class="theme-tag" style="background:#FFEAA722;color:#FFEAA7">Sales Coaching AI</span><span class="theme-tag" style="background:#FFEAA722;color:#FFEAA7">Pipeline AI</span></div><p class="cluster-desc">The entire sales motion is being AI-automated -- from prospect identification to personalized outreach to deal closing support.</p><div class="cluster-examples">💡 Idea: Most B2B companies sit on years of call recordings and won/lost data. An AI that extracts sales playbooks and coaches reps in real-time could be transformative.</div></div>
<div class="cluster-card"><div class="cluster-header"><div class="cluster-icon" style="background:#f6c90e22">🎓</div><div><div class="cluster-title">EdTech and AI Tutoring</div><div class="cluster-count">~40 companies</div></div></div><div class="cluster-themes"><span class="theme-tag" style="background:#f6c90e22;color:#f6c90e">AI Tutors</span><span class="theme-tag" style="background:#f6c90e22;color:#f6c90e">Skills Assessment</span><span class="theme-tag" style="background:#f6c90e22;color:#f6c90e">Corporate Training</span><span class="theme-tag" style="background:#f6c90e22;color:#f6c90e">Language Learning</span><span class="theme-tag" style="background:#f6c90e22;color:#f6c90e">STEM Learning</span></div><p class="cluster-desc">One-on-one tutoring is the gold standard in education. AI is making personalized tutoring for any subject, any level, any language accessible at scale.</p><div class="cluster-examples">💡 Idea: Most AI tutoring is K-12 focused. What about professional skills? An AI that teaches anyone to code or manage finances at a professional level has a massive market.</div></div>
<div class="cluster-card"><div class="cluster-header"><div class="cluster-icon" style="background:#ff6b9d22">🚀</div><div><div class="cluster-title">Space, Quantum and Deep Tech</div><div class="cluster-count">~30 companies</div></div></div><div class="cluster-themes"><span class="theme-tag" style="background:#ff6b9d22;color:#ff6b9d">Satellite Intelligence</span><span class="theme-tag" style="background:#ff6b9d22;color:#ff6b9d">Space Manufacturing</span><span class="theme-tag" style="background:#ff6b9d22;color:#ff6b9d">Quantum Sensing</span><span class="theme-tag" style="background:#ff6b9d22;color:#ff6b9d">Photonic Computing</span><span class="theme-tag" style="background:#ff6b9d22;color:#ff6b9d">Materials AI</span></div><p class="cluster-desc">Satellite constellations are now cheap enough to build commercially. Quantum sensing is proving practical for GPS-denied navigation and materials analysis.</p><div class="cluster-examples">💡 Idea: Satellite imagery combined with AI can monitor anything on Earth in near-real-time. Most of this is untapped for agriculture, supply chain, and environmental monitoring.</div></div></div></div>

function filterCompanies(){
  var s=(document.getElementById("companySearch").value||"").toLowerCase();
  var f=ALL.filter(function(c){return(!s||c.name.toLowerCase().includes(s)||(c.desc||"").toLowerCase().includes(s))&&(!AC||c.archetype===AC)&&(!AB||c.batch===AB);});

}
